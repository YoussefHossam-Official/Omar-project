<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artiva – Add Product</title>
  <!-- Shared styles -->
  <link rel="stylesheet" href="style/styles.css" />
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="style/add-product.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Top navigation bar -->
    <nav class="top-nav">
      <button class="nav-back" onclick="window.location.href='my-shop.html'">Add Product</button>
      <!-- Replace SVG with: <img src="assets/artiva-logo.png" width="32" alt="Artiva" /> -->
      <div class="nav-logo">
        <svg width="32" height="32" viewBox="0 0 50 50" fill="none">
          <path d="M25 8 C20 8 12 14 12 22 C12 30 18 36 25 40 C32 36 38 30 38 22 C38 14 30 8 25 8Z" fill="var(--gold)" opacity="0.9"/>
          <path d="M19 20 C19 16 22 13 25 13 C28 13 31 16 31 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="25" cy="24" r="4" fill="white"/>
        </svg>
        Artiva
      </div>
    </nav>

    <!-- Two-column layout: image upload left / fields right -->
    <div class="product-layout">

      <!-- Left: product photo upload -->
      <div>
        <!--
          Clicking the upload box opens the file picker.
          previewProductImage() in add-product.js handles the preview.
          Max 30 product photos allowed.
        -->
        <div class="upload-box product-image-upload"
             onclick="document.getElementById('product-img-input').click()"
             role="button" tabindex="0">
          <!-- Camera icon: hidden after first image is selected -->
          <svg class="camera-icon" viewBox="0 0 56 56" fill="none"
               stroke="currentColor" stroke-width="1.5" id="camera-placeholder">
            <rect x="6" y="16" width="44" height="32" rx="6"/>
            <circle cx="28" cy="32" r="10"/>
            <circle cx="28" cy="32" r="5" fill="currentColor" stroke="none" opacity="0.3"/>
            <path d="M20 16L24 10H32L36 16"/>
            <circle cx="44" cy="22" r="2" fill="currentColor" stroke="none"/>
          </svg>
          <div class="upload-hint">(Max 30)</div>
          <input type="file" id="product-img-input" accept="image/*" multiple
                 style="display:none" onchange="previewProductImage(event)" />
        </div>
        <!-- Thumbnail strip injected here by add-product.js -->
        <div id="img-thumbnails" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;"></div>
      </div>

      <!-- Right: product detail fields -->
      <div class="product-fields">

        <!-- Price in EGP -->
        <div>
          <div class="field-label">Price</div>
          <div class="price-wrapper">
            <input type="number" class="price-input" id="price"
                   placeholder="" aria-label="Price in EGP" min="0" />
            <span class="price-suffix">EGP</span>
          </div>
        </div>

        <!-- Product description -->
        <div>
          <div class="field-label">Describtion</div>
          <textarea class="input-field desc-textarea"
                    aria-label="Product description"
                    placeholder="Describe your product..."></textarea>
        </div>

        <!-- Dimensions: L, W, H -->
        <div>
          <div class="field-label">Dimensions</div>
          <div class="dimensions-row">
            <input type="number" class="dim-input" placeholder="L" aria-label="Length" min="0" />
            <input type="number" class="dim-input" placeholder="W" aria-label="Width"  min="0" />
            <input type="number" class="dim-input" placeholder="H" aria-label="Height" min="0" />
          </div>
        </div>

        <!-- Material + Weight side by side -->
        <div>
          <div class="mat-weight-row">
            <div>
              <div class="field-label">Material</div>
              <input type="text" class="input-field" aria-label="Material" />
            </div>
            <div>
              <div class="field-label">Weight</div>
              <input type="text" class="input-field" aria-label="Weight" />
            </div>
          </div>
        </div>

        <!-- Estimated Process Time -->
        <div>
          <div class="field-label">Estimated Process Time</div>
          <input type="text" class="input-field process-input" aria-label="Estimated process time" />
        </div>

        <!-- Save button: validation handled by add-product.js -->
        <div style="margin-top:8px;">
          <button class="btn-primary" onclick="saveProduct()">Save Product</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared JS first, then page-specific JS -->
  <script src="js/main.js"></script>
  <script src="js/add-product.js"></script>
</body>
</html>
