<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artiva – Profile Data</title>
  <!-- Shared styles -->
  <link rel="stylesheet" href="style/styles.css" />
  <!-- Page-specific styles -->
  <link rel="stylesheet" href="style/profile-data.css" />
</head>
<body>
  <div class="page-wrapper">

    <!-- Top navigation bar -->
    <nav class="top-nav">
      <button class="nav-back" onclick="window.location.href='start-selling.html'">Profile Data</button>
      <!-- Replace SVG with: <img src="assets/artiva-logo.png" width="32" alt="Artiva" /> -->
      <div class="nav-logo">
        <svg width="32" height="32" viewBox="0 0 50 50" fill="none">
          <path d="M25 8 C20 8 12 14 12 22 C12 30 18 36 25 40 C32 36 38 30 38 22 C38 14 30 8 25 8Z" fill="var(--gold)" opacity="0.9"/>
          <path d="M19 20 C19 16 22 13 25 13 C28 13 31 16 31 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="25" cy="24" r="4" fill="white"/>
        </svg>
        Artiva
      </div>
    </nav>

    <div class="page-content">
      <h1 class="page-heading">Please Fill Your Information</h1>

      <!-- Section 1: Full Name + Date of Birth -->
      <div class="form-card">
        <div class="field-label">Full Name</div>
        <input type="text" class="input-field" id="full-name" placeholder="" aria-label="Full Name" />

        <div style="margin-top: 18px;">
          <div class="field-label">Date Of Birth</div>
          <div class="dob-row">
            <!-- Days populated by main.js on DOMContentLoaded -->
            <select class="select-field" id="day-select" aria-label="Day">
              <option value="">Day</option>
            </select>
            <select class="select-field" aria-label="Month">
              <option value="">Month</option>
              <option>January</option><option>February</option><option>March</option>
              <option>April</option><option>May</option><option>June</option>
              <option>July</option><option>August</option><option>September</option>
              <option>October</option><option>November</option><option>December</option>
            </select>
            <!-- Years populated by main.js on DOMContentLoaded -->
            <select class="select-field" id="year-select" aria-label="Year">
              <option value="">Year</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Section 2: Tax ID / Social Security Number toggle -->
      <div class="form-card">
        <div class="id-row">
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="id-type" value="tax" checked />
              Tax ID
            </label>
            <label class="radio-option">
              <input type="radio" name="id-type" value="ssn" />
              Social Security Number
            </label>
          </div>
          <input type="text" class="input-field" id="id-input" placeholder="" aria-label="ID Number" style="max-width: 260px;" />
        </div>
      </div>

      <!-- Section 3: Citizenship, Country, Phone, Address, ID Upload -->
      <div class="form-card">
        <div class="two-col">
          <div>
            <div class="field-label">Citizenship</div>
            <!-- Countries populated by main.js on DOMContentLoaded -->
            <select class="select-field" id="citizenship-select" aria-label="Citizenship"></select>
          </div>
          <div>
            <div class="field-label">Country</div>
            <!-- Countries populated by main.js on DOMContentLoaded -->
            <select class="select-field" id="country-select" aria-label="Country"></select>
          </div>
        </div>

        <div class="two-col" style="margin-top: 18px; align-items: start;">
          <!-- Left: Phone + Address -->
          <div style="display:flex; flex-direction:column; gap:16px;">
            <div>
              <div class="field-label">Phone Number</div>
              <div class="phone-wrapper">
                <span class="phone-prefix">EGP (+20)</span>
                <input type="tel" class="phone-input" placeholder="" aria-label="Phone Number" />
              </div>
            </div>
            <div>
              <div class="field-label">Address</div>
              <textarea class="input-field" rows="4" aria-label="Address"></textarea>
            </div>
          </div>

          <!-- Right: National ID upload + previews -->
          <div>
            <div class="field-label">
              National ID Card <span style="color:#bbb; font-size:12px;">(2 Photos)</span>
            </div>
            <!-- Clicking opens file picker for ID photos -->
            <div class="upload-box upload-box-tall"
                 onclick="document.getElementById('id-upload').click()"
                 role="button" tabindex="0">
              <svg class="upload-icon" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 28V16M22 16L16 22M22 16L28 22" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="6" y="6" width="32" height="32" rx="6"/>
                <path d="M14 38H30" stroke-linecap="round"/>
              </svg>
              Select File Or Drag Here
              <input type="file" id="id-upload" multiple accept="image/*"
                     style="display:none" onchange="handleIDUpload(event)" />
            </div>
            <!-- Thumbnail previews injected here by profile-data.js -->
            <div id="id-preview" style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;"></div>
          </div>
        </div>
      </div>

      <!-- Verify button -->
      <div style="text-align:center; margin-top:12px;">
        <button class="btn-primary" onclick="submitProfile()">Verify</button>
        <div class="verify-note">(Data Verification Takes 6 - 12 Hours)</div>
      </div>
    </div>
  </div>

  <!-- Shared JS first, then page-specific JS -->
  <script src="js/main.js"></script>
  <script src="js/profile-data.js"></script>
</body>
</html>
